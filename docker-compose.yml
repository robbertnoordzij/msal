services:
  redis:
    image: redis:7-alpine
    container_name: msal-bff-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme-in-dev}
      --bind 127.0.0.1
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme-in-dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme-in-dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
